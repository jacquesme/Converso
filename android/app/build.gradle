plugins {
  id("com.android.application")
  id("com.facebook.react")
  // id("org.jetbrains.kotlin.android") // only if you use Kotlin
}

android {
  namespace "com.converso"
  compileSdk 36  // 34 or 36, depending on which SDK you have installed

  defaultConfig {
    applicationId "com.converso"
    minSdk 24
    targetSdk 36
    versionCode 1
    versionName "1.0"
    vectorDrawables.useSupportLibrary = true
  }

  // your signingConfigs, buildTypes, etc.
}

react {
  // Autolink libraries from autolinking.json
  autolinkLibrariesWithApp()
}

dependencies {
  implementation("androidx.appcompat:appcompat:1.6.1")
  
  // React Native dependencies - should be automatically added by plugin, but adding explicitly
  // The plugin's resolution strategy will force the correct version from reactNativeDir
  implementation("com.facebook.react:react-android")
  implementation("com.facebook.react:hermes-android")
}
